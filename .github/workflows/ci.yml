name: ci

on:
  push:
  pull_request:

jobs:
  validate-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate example scripts
        run: python3 tools/validate_scripts.py

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DAUDIO_SCRIPTER_BUILD_PLUGIN=OFF
      - name: Build
        run: cmake --build build --config Release --target audio_scripter_parser_tests
      - name: Run tests
        run: ctest --test-dir build --output-on-failure
