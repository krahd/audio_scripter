<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Implementation Guide — audio_scripter</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    :root {
      --bg:      #161a20;
      --surface: #1e2a32;
      --card:    #263840;
      --border:  #2d4858;
      --text:    #d4d4d4;
      --dim:     #8a9aaa;
      --accent:  #4ec9b0;
      --accent2: #569cd6;
      --kw:      #c586c0;
      --fn:      #dcdcaa;
      --num:     #b5cea8;
      --comment: #6a9955;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 16px;
      line-height: 1.7;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    nav .inner {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 900px; margin: 0 auto; padding: 0 24px; height: 52px;
    }
    nav .brand {
      font-family: "Courier New", monospace; font-size: 1.1rem; font-weight: 700;
      color: var(--accent); letter-spacing: -0.5px;
    }
    nav .links { display: flex; gap: 24px; }
    nav .links a { color: var(--dim); font-size: 0.9rem; }
    nav .links a:hover { color: var(--text); text-decoration: none; }

    .container { max-width: 860px; margin: 0 auto; padding: 48px 24px 80px; }

    .md h1 { font-size: 2rem; color: var(--accent); margin: 0 0 8px; font-family: "Courier New", monospace; }
    .md h2 { font-size: 1.35rem; color: var(--text); margin: 48px 0 16px;
              border-bottom: 1px solid var(--border); padding-bottom: 6px; }
    .md h3 { font-size: 1.05rem; color: var(--accent2); margin: 28px 0 10px; }
    .md h4 { font-size: 0.95rem; color: var(--dim); margin: 20px 0 8px; font-weight: 600; }
    .md p  { margin: 0 0 14px; }
    .md ul, .md ol { margin: 0 0 14px 24px; }
    .md li { margin-bottom: 4px; }
    .md blockquote {
      border-left: 3px solid var(--border); padding-left: 16px;
      color: var(--dim); margin: 0 0 14px;
    }
    .md table { width: 100%; border-collapse: collapse; font-size: 0.88rem; margin: 0 0 24px; }
    .md th {
      text-align: left; color: var(--dim); font-weight: 600;
      border-bottom: 1px solid var(--border); padding: 6px 12px 6px 0;
    }
    .md td { padding: 5px 12px 5px 0; border-bottom: 1px solid var(--surface); vertical-align: top; }
    .md code {
      font-family: "Courier New", monospace; font-size: 0.88em;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 3px; padding: 1px 5px; color: var(--fn);
    }
    .md pre {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 18px 20px; overflow-x: auto; margin: 0 0 20px;
    }
    .md pre code {
      background: none; border: none; padding: 0; color: var(--text);
      font-size: 0.875rem; line-height: 1.6;
    }
    .md hr { border: none; border-top: 1px solid var(--border); margin: 36px 0; }

    #loading { color: var(--dim); font-size: 0.9rem; padding: 60px 0; text-align: center; }
  </style>
</head>
<body>

<nav>
  <div class="inner">
    <a class="brand" href="index.html">audio_scripter</a>
    <div class="links">
      <a href="language_spec.html">Language Manual</a>
      <a href="index.html#examples">Examples</a>
      <a href="https://github.com/krahd/audio_scripter">GitHub</a>
    </div>
  </div>
</nav>

<div class="container">
  <div id="loading">Loading implementation guide…</div>
  <div id="content" class="md" style="display:none"></div>
</div>

<script>
  marked.use({ gfm: true, breaks: false });

  fetch('DEVELOPER_GUIDE.md')
    .then(r => {
      if (!r.ok) throw new Error(r.statusText);
      return r.text();
    })
    .then(md => {
      document.getElementById('loading').style.display = 'none';
      const el = document.getElementById('content');
      el.innerHTML = marked.parse(md);
      el.style.display = '';
    })
    .catch(err => {
      document.getElementById('loading').textContent =
        'Could not load guide: ' + err.message;
    });
</script>

</body>
</html>
